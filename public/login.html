<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login · Bi Tagme</title>
<link rel="stylesheet" href="/theme.css"/>
<script src="/theme-init.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:32px 28px;width:min(380px,100%);box-shadow:var(--card-shadow)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.title{font-size:18px;font-weight:800;letter-spacing:-.3px}
.sub{font-size:12px;color:var(--muted);margin-top:2px}
label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;margin-bottom:14px}
input:focus{border-color:var(--accent)}
button[type=submit]{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px}
button[type=submit]:hover{opacity:.92}
button[type=submit]:disabled{opacity:.5;cursor:not-allowed}
.err{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.3);color:var(--red);border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:14px;display:none}
.err.on{display:block}
</style>
</head>
<body>
<button type="button" class="btn-theme theme-toggle-float" id="themeBtn" title="Alternar tema">☀ Claro</button>
<div class="card">
  <div class="brand">
    <div class="dot"></div>
    <div>
      <div class="title">Bi Tagme</div>
      <div class="sub">Reservas & Fila de Espera</div>
    </div>
  </div>
  <div id="err" class="err"></div>
  <form id="form">
    <label for="user">Usuário</label>
    <input id="user" name="user" type="text" autocomplete="username" required autofocus/>
    <label for="password">Senha</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required/>
    <button type="submit" id="btn">Entrar</button>
  </form>
</div>
<script>
const form = document.getElementById('form');
const err = document.getElementById('err');
const btn = document.getElementById('btn');
const themeBtn = document.getElementById('themeBtn');
const THEME_KEY = 'bi_tagme_theme';

function currentTheme() {
  return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
}

function updateThemeBtn() {
  const dark = currentTheme() === 'dark';
  themeBtn.innerHTML = dark ? '☀ Claro' : '☽ Escuro';
  themeBtn.title = dark ? 'Ativar modo claro' : 'Ativar modo escuro';
}

themeBtn.addEventListener('click', () => {
  const next = currentTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem(THEME_KEY, next); } catch (_) { /* ignore */ }
  updateThemeBtn();
});

updateThemeBtn();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.classList.remove('on');
  btn.disabled = true;
  btn.textContent = 'Entrando…';
  try {
    const body = {
      user: document.getElementById('user').value.trim(),
      password: document.getElementById('password').value,
    };
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Falha no login');
    window.location.href = '/';
  } catch (ex) {
    err.textContent = ex.message || 'Usuário ou senha inválidos';
    err.classList.add('on');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
